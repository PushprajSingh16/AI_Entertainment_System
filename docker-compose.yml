services:
  backend:
    build: ./backend
    container_name: ai-entertainment-backend
    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    networks:
      - ai-network

    restart: unless-stopped

    # ✅ FIX: avoid requests dependency
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  frontend:
    build: ./frontend
    container_name: ai-entertainment-frontend
    ports:
      - "3000:3000"

    environment:
      - VITE_API_URL=http://backend:8000

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - ai-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


networks:
  ai-network:
    driver: bridge